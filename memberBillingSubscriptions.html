<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Subscription Payment</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>

    <body>
        <div class="container top">
            <table class="navigation">
                <tr>
                    <td class="navBox"><a href=""><strong>[Website name]</strong></a></td>
                    <td class="navBox"><a href=""><strong>Tutorials</strong></a></td>
                    <td class="navBox"><a href="memberClassView.html"><strong>Classes</strong></a></td>
                    <td class="navBox"><a href=""><strong>Shop</strong></a></td>
                    <td class="navBox"><a href="memberProfile.html"><strong>Profile</strong></a></td>
                    <td class="navBox"><a href=""><strong>Logout</strong></a></td>
                </tr>
            </table>
        </div>

        <div class="container">
            <div class="content">
                <h1>Subscription Payment</h1>
                <form id="subscriptionPayment">
                    <label>Cardholder Name</label>
                    <input type="text" id="cardholderName">

                    <label>Card Number</label>
                    <input type="text" id="cardNumber">

                    <div class="paymentRow">
                        <div class="paymentField">
                            <label>Expiry</label>
                            <input type="text" id="cardExpiry" placeholder="MM / YY">
                        </div>
                        <div class="paymentField">
                            <label>CVV</label>
                            <input type="text" id="cardCvv">
                        </div>
                    </div>

                    <div class="orderSummary">
                        <label>Order Summary</label>
                        <p>Pro Plan (Monthly)</p>
                        <p>$25.00</p>
                        <p>Secure payment</p>
                    </div>

                    <button type="submit">Pay Now</button>
                </form>
                <a href="memberProfile.html">Cancel and go back</a>
            </div>
        </div>
    </body>
</html>
