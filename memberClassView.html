<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>View Classes</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>

    <body>
        <div class="container top">
            <table class="navigation">
                <tr>
                    <td class="navBox"><a href=""><strong>[Website name]</strong></a></td>
                    <td class="navBox"><a href=""><strong>Tutorials</strong></a></td>
                    <td class="navBox"><a href="memberClassView.html"><strong>Classes</strong></a></td>
                    <td class="navBox"><a href=""><strong>Shop</strong></a></td>
                    <td class="navBox"><a href=""><strong>Profile</strong></a></td>
                    <td class="navBox"><a href=""><strong>Logout</strong></a></td>
                </tr>
            </table>
        </div>

        <div class="container">
            <div class="filters">
                <form id="classFilters">
                    <label>Filters:</label>
                    <select id="filterOption">
                        <option value="1">Upcoming First</option>
                        <option value="2">Upcoming Last</option>
                        <option value="3">Alphabetical</option>
                        <option value="4">Category</option>
                    </select>
                    <button type="submit">Apply Filters</button>
                </form>
            </div>
            

            <template id="classTemplate">
                <div class="classView">
                    <h2 class="className"></h2>
                    <p class="classDate"></p>
                    <a class="classDetails">Click here to see details!</a>
                </div>
            </template>

            <div id="classList"></div>

        </div>

        <script type="module">
            import { db } from './firebaseConfig.js'
            import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-database.js";

            // fetching all classes and displaying in a list

            // set variables
            const list = document.getElementById('classList');
            const template = document.getElementById('classTemplate');
            const classesRef = ref(db, 'classes')

            // create real time listener
            onValue(classesRef, (snapshot) => {
                // clear list before re-render
                list.innerHTML = ''; 

                // get data snapshot
                const data = snapshot.val();

                // in case data is null, return
                if (!data) {
                    list.innerHTML = "<p>No classes found</p>";
                    return;
                }

                // loop over each class
                for (let key in data) {
                    const classData = data[key];

                    // make copy of template
                    const templateCopy = template.content.cloneNode(true);

                    // fill in template with class details
                    templateCopy.querySelector('.className').textContent = classData.name;
                    templateCopy.querySelector('.classDate').textContent = classData.date;
                    // pass class id as a parameter to next page
                    templateCopy.querySelector('.classDetails').href = `memberClassDetails.html?id=${key}`;

                    // add to list
                    list.appendChild(templateCopy);
                }
            });
        </script>
    </body>
</html>
